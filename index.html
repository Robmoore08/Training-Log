const STORAGE_KEY = "robbie_training_log";
const API_URL = "/api/sync";

function loadRuns() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}

function saveRuns(runs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(runs));
}

async function fetchRunsFromSheet() {
  try {
    const res = await fetch(`${API_URL}?action=getRuns`);
    const data = await res.json();
    if (Array.isArray(data)) {
      const runs = data.map(r => ({
        ...r,
        splits: typeof r.splits === "string" ? JSON.parse(r.splits || "[]") : (r.splits || []),
        indoor: r.indoor === true || r.indoor === "TRUE" || r.indoor === "true",
      }));
      saveRuns(runs);
      return runs;
    }
    return loadRuns();
  } catch {
    return loadRuns();
  }
}

async function saveRunToSheet(run) {
  try {
    const encoded = encodeURIComponent(JSON.stringify(run));
    await fetch(`${API_URL}?action=saveRun&run=${encoded}`);
  } catch (e) {
    console.error("Failed to save to sheet", e);
  }
}

async function deleteRunFromSheet(id) {
  try {
    await fetch(`${API_URL}?action=deleteRun&id=${id}`);
  } catch (e) {
    console.error("Failed to delete from sheet", e);
  }
}

const RACE_DATE = new Date("2026-10-25");
const PLAN_START = new Date("2026-06-29"); // Week 1 starts Mon Jun 29 (per official 17-week plan)

function daysToRace() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = Math.ceil((RACE_DATE - today) / (1000 * 60 * 60 * 24));
  return diff > 0 ? diff : 0;
}

function getTrainingWeek() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = Math.floor((today - PLAN_START) / (1000 * 60 * 60 * 24 * 7));
  if (diff < 0) return null; // Before plan starts
  if (diff >= 17) return null; // Plan complete
  return diff + 1;
}

function shoeKm(runs) {
  const totals = {};
  SHOES.forEach((s) => { totals[s] = 0; });
  runs.forEach((r) => {
    if (r.shoe && r.distance) totals[r.shoe] = (totals[r.shoe] || 0) + parseFloat(r.distance);
  });
  return totals;
}

function getWeeklyKm(runs) {
  const weeks = {};
  runs.forEach((r) => {
    if (!r.distance || !r.date) return;
    const d = new Date(r.date + "T00:00:00");
    const day = d.getDay(); // 0=Sun
    const diff = (day - WEEK_START + 7) % 7;
    const monday = new Date(d);
    monday.setDate(d.getDate() - diff);
    const key = monday.toISOString().slice(0, 10);
    weeks[key] = (weeks[key] || 0) + parseFloat(r.distance);
  });
  return weeks;
}


// Race time predictions using Riegel formula: T2 = T1 * (D2/D1)^1.06
// Based on half marathon PB: 1:50:05 = 6605 seconds
const HALF_TIME_SECS = 6605;
const HALF_DIST = 21.0975;

function predictRaceTime(distKm) {
  return HALF_TIME_SECS * Math.pow(distKm / HALF_DIST, 1.06);
}

// 10km equivalent of 3:45 marathon via Riegel

const GOAL_10K_PACE = GOAL_10K_SECS / 10; // ~4:53/km = 293 sec/km

function planWeekDates(week) {
  const monday = new Date(PLAN_START.getTime() + (week.week - 1) * 7 * 86400000);
  return week.sessions.map((s) => {
    const d = new Date(monday.getTime() + s.day * 86400000);
    return { ...s, date: d };
  });
}
function fmtShortDate(d) {
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

// Adjust a session's pace target based on current-form efficiency for that run type.
// HR targets are NEVER adjusted — they're safety/pacing-discipline boundaries, not fitness targets.
// Clamped to +/-10% so a small sample can't swing the plan wildly.
function getAdjustedSession(session, runsOfType) {
  if (!session.paceSec || (session.type !== "Tempo" && session.type !== "Long")) {
    return { ...session, adjusted: false };
  }
  const scores = runsOfType.map((r) => calcEfficiency(r)).filter((s) => s !== null);
  if (scores.length < 2) return { ...session, adjusted: false, reason: "Not enough logged runs yet — showing plan default" };
  const currentFormPct = getRollingEfficiencyPct(runsOfType);
  if (currentFormPct === null) return { ...session, adjusted: false };
  const factor = Math.min(Math.max(currentFormPct / TARGET_PCT, 0.9), 1.1);
  const adjustedPaceSec = Math.round(session.paceSec / factor);
  const reason = currentFormPct >= TARGET_PCT
    ? `${session.type} current form ${currentFormPct}% → target tightened`
    : `${session.type} current form ${currentFormPct}% → target eased`;
  return { ...session, adjusted: adjustedPaceSec !== session.paceSec, adjustedPaceSec, reason };
}

function calcEfficiency(run) {
  const pace = paceToSeconds(run.avgPace);
  const hr = parseFloat(run.avgHR);
  const dist = parseFloat(run.distance) || 1;
  if (!pace || !hr) return null;

  // Heat adjustment — reduce effective HR by 1 bpm per degree above 15°C
  const temp = parseFloat(run.temperature) || 15;
  const heatAdj = Math.max(0, temp - 15) * 1.0;

  // Elevation adjustment — add 1 bpm per 10m gain per km
  const gain = parseFloat(run.elevationGain) || 0;
  const gainPerKm = gain / dist;
  const elevAdj = gainPerKm / 10;

  // Indoor adjustment — treadmill HR slightly lower, add 2 bpm to normalise
  const indoorAdj = (run.indoor === true || run.indoor === "true") ? 2 : 0;

  const adjustedHR = hr - heatAdj - elevAdj + indoorAdj;
  if (adjustedHR <= 0) return null;

  if (run.type === "Easy") {
    // Easy runs — reward pace faster than target AND HR lower than target, with cadence factor
    const paceRatio = EASY_TARGET_PACE / pace; // >1 if faster than target pace
    const hrRatio = EASY_TARGET_HR / adjustedHR; // >1 if HR lower than target
    const cadence = parseFloat(run.avgCadence) || 0;
    let cadenceFactor = 1.0;
    if (cadence > 0) {
      if (cadence >= 166) cadenceFactor = 1.0;
      else if (cadence >= 163) cadenceFactor = 0.97;
      else if (cadence >= 160) cadenceFactor = 0.94;
      else cadenceFactor = 0.90;
    }
    return parseFloat((paceRatio * hrRatio * cadenceFactor).toFixed(3));

  } else if (run.type === "Tempo") {
    // Tempo — reward pace faster than goal AND HR lower than target, scaled by distance (ref 10km)
    const distFactor = Math.pow(Math.min(dist, 10) / 10, 0.3);
    const paceRatio = GOAL_10K_PACE / pace; // >1 if faster than goal pace
    const hrRatio = TARGET_HR / adjustedHR; // >1 if HR lower than target
    return parseFloat((paceRatio * hrRatio * distFactor).toFixed(3));

  } else {
    // Long — reward pace faster than goal AND HR lower than target, scaled by distance (ref 42.2km)
    const distFactor = Math.pow(Math.min(dist, 42.2) / 42.2, 0.3);
    const paceRatio = GOAL_MARATHON_PACE / pace; // >1 if faster than goal pace
    const hrRatio = TARGET_HR / adjustedHR; // >1 if HR lower than target
    return parseFloat((paceRatio * hrRatio * distFactor).toFixed(3));
  }
}

function getEfficiencyPct(score) {
  if (!score) return null;
  // Score is self-normalized: 1.0 = exactly target pace at target HR (distance-scaled for Tempo/Long)
  return Math.round(score * TARGET_PCT);
}

// Recency-weighted average of the last N runs of a type — reflects CURRENT form,
// unlike a personal-best which only ever holds steady or climbs.
function getRollingEfficiencyPct(typeRuns, weights = [0.4, 0.3, 0.2, 0.1]) {
  const sorted = [...typeRuns].sort((a, b) => b.date.localeCompare(a.date));
  const scores = sorted.map((r) => calcEfficiency(r)).filter((s) => s !== null).slice(0, weights.length);
  if (!scores.length) return null;
  const w = weights.slice(0, scores.length);
  const wSum = w.reduce((a, b) => a + b, 0);
  const weightedScore = scores.reduce((sum, s, i) => sum + s * w[i], 0) / wSum;
  return getEfficiencyPct(weightedScore);
}

function getEfficiencyRating(pct) {
  if (!pct) return null;
  if (pct >= 100) return { label: "Beyond target", color: "#7c3aed" };
  if (pct >= 95) return { label: "On target", color: "#16a34a" };
  if (pct >= 80) return { label: "Good progress", color: "#d97706" };
  if (pct >= 65) return { label: "Building", color: "#ea580c" };
  return { label: "Early days", color: "#dc2626" };
}


function getHRZone(hr) {
  const h = parseInt(hr);
  if (!h) return null;
  if (h < 108) return { zone: "Z1", label: "Recovery", color: "#2563eb" };
  if (h < 130) return { zone: "Z2", label: "Easy/Aerobic", color: "#16a34a" };
  if (h < 148) return { zone: "Z3", label: "Steady/Long Run", color: "#d97706" };
  if (h < 162) return { zone: "Z4", label: "Marathon Zone", color: "#ea580c" };
  return { zone: "Z5", label: "Max/Intervals", color: "#dc2626" };
}

function kphToAdjustedPace(kph) {
  // Convert treadmill kph at 1% incline to equivalent outdoor min:sec/km pace
  // 1% incline adds ~0.5% to oxygen cost; we subtract that from speed equivalence
  // Adjusted speed = kph * 1.005 (slightly faster equivalent on flat)
  if (!kph || isNaN(parseFloat(kph))) return "";
  const adjustedKph = parseFloat(kph) * 1.005;
  const secPerKm = 3600 / adjustedKph;
  const mins = Math.floor(secPerKm / 60);
  const secs = Math.round(secPerKm % 60);
  return `${mins}:${secs.toString().padStart(2, "0")}`;
}

function paceToSeconds(pace) {
  if (!pace) return null;
  const parts = pace.split(":");
  if (parts.length === 2) return parseInt(parts[0]) * 60 + parseInt(parts[1]);
  return null;
}

function secondsToPace(s) {
  if (!s) return "--";
  const m = Math.floor(s / 60);
  const sec = Math.round(s % 60);
  return `${m}:${sec.toString().padStart(2, "0")}`;
}

      <div style={{ fontSize: 20, fontWeight: 700, color: "#0f172a", fontFamily: "monospace" }}>
        {value || <span style={{ color: "#cbd5e1" }}>--</span>}
        {value && unit && <span style={{ fontSize: 13, color: "#64748b", marginLeft: 2 }}>{unit}</span>}
      </div>

  );
}

function MiniChart({ runs, field, label, unit = "", transform, reverse }) {
  const [activeIndex, setActiveIndex] = useState(null);

  const vals = runs
    .slice(-10)
    .map((r) => ({ date: r.date, val: transform ? transform(r[field]) : parseFloat(r[field]) }))
    .filter((d) => d.val !== null && !isNaN(d.val));

  if (vals.length < 2) return null;

  const min = Math.min(...vals.map((d) => d.val));
  const max = Math.max(...vals.map((d) => d.val));
  const range = max - min || 1;
  const W = 280, H = 70, PAD = 8;

  const pts = vals.map((d, i) => {
    const x = PAD + (i / (vals.length - 1)) * (W - PAD * 2);
    const norm = (d.val - min) / range;
    const y = PAD + (reverse ? norm : 1 - norm) * (H - PAD * 2);
    return `${x},${y}`;
  });

  const latest = vals[vals.length - 1];
  const prev = vals[vals.length - 2];
  const trend = reverse
    ? latest.val < prev.val ? "↓" : latest.val > prev.val ? "↑" : "→"
    : latest.val > prev.val ? "↑" : latest.val < prev.val ? "↓" : "→";
  const trendColor = reverse
    ? latest.val < prev.val ? "#16a34a" : "#dc2626"
    : latest.val > prev.val ? "#16a34a" : "#dc2626";

  const fmtVal = (v) => (unit === "min/km" ? secondsToPace(v) : `${v.toFixed(1)}${unit}`);
  const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });

  return (
    <div style={{ background: "#f1f5f9", borderRadius: 10, padding: "12px 14px", marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <span style={{ fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.07em" }}>{label}</span>
        <span style={{ fontSize: 13, fontWeight: 700, color: trendColor }}>{trend} {unit === "min/km" ? secondsToPace(latest.val) : latest.val.toFixed(1)}{unit !== "min/km" ? unit : ""}</span>
      </div>
      <svg width={W} height={H} style={{ overflow: "visible" }} onClick={() => setActiveIndex(null)}>
        <polyline points={pts.join(" ")} fill="none" stroke="#2563eb" strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
        {vals.map((d, i) => {
          const x = PAD + (i / (vals.length - 1)) * (W - PAD * 2);
          const norm = (d.val - min) / range;
          const y = PAD + (reverse ? norm : 1 - norm) * (H - PAD * 2);
          const active = activeIndex === i;
          return (
            <g key={i}>
              {active && (
                <>
                  <line x1={x} y1={0} x2={x} y2={H} stroke="#2563eb" strokeWidth={1} strokeDasharray="3 3" opacity={0.35} />
                  <rect
                    x={Math.min(Math.max(x - 30, 0), W - 60)}
                    y={y > H / 2 ? y - 30 : y + 8}
                    width={60} height={22} rx={5}
                    fill="#0f172a"
                  />
                  <text
                    x={Math.min(Math.max(x, 30), W - 30)}
                    y={(y > H / 2 ? y - 30 : y + 8) + 14}
                    textAnchor="middle"
                    fontSize={10}
                    fontWeight={700}
                    fill="#ffffff"
                  >
                    {fmtVal(d.val)}
                  </text>
                  <text
                    x={Math.min(Math.max(x, 30), W - 30)}
                    y={(y > H / 2 ? y - 30 : y + 8) + 20}
                    textAnchor="middle"
                    fontSize={7}
                    fill="#cbd5e1"
                  >
                    {fmtDate(d.date)}
                  </text>
                </>
              )}
              <circle cx={x} cy={y} r={active ? 5 : 3} fill="#2563eb" stroke={active ? "#ffffff" : "none"} strokeWidth={active ? 1.5 : 0} />
              <circle
                cx={x} cy={y} r={14} fill="rgba(0,0,0,0.001)"
                onClick={(e) => { e.stopPropagation(); setActiveIndex(active ? null : i); }}
                style={{ cursor: "pointer", pointerEvents: "all" }}
              />
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function DualChart({ runs }) {
  const [activeIndex, setActiveIndex] = useState(null);
  const W = 280, H = 90, PAD = 10;

  const data = runs.slice(-10).map((r) => ({
    date: r.date,
    hr: parseFloat(r.avgHR),
    pace: paceToSeconds(r.avgPace),
  })).filter((d) => !isNaN(d.hr) && d.pace);

  if (data.length < 2) return null;

  const hrMin = Math.min(...data.map((d) => d.hr));
  const hrMax = Math.max(...data.map((d) => d.hr));
  const hrRange = hrMax - hrMin || 1;

  const paceMin = Math.min(...data.map((d) => d.pace));
  const paceMax = Math.max(...data.map((d) => d.pace));
  const paceRange = paceMax - paceMin || 1;

  const hrPts = data.map((d, i) => {
    const x = PAD + (i / (data.length - 1)) * (W - PAD * 2);
    const y = PAD + (1 - (d.hr - hrMin) / hrRange) * (H - PAD * 2);
    return `${x},${y}`;
  });

  // Pace is reversed — lower pace (faster) is better so plot high
  const pacePts = data.map((d, i) => {
    const x = PAD + (i / (data.length - 1)) * (W - PAD * 2);
    const y = PAD + ((d.pace - paceMin) / paceRange) * (H - PAD * 2);
    return `${x},${y}`;
  });

  const latestHR = data[data.length - 1].hr;
  const prevHR = data[data.length - 2].hr;
  const latestPace = data[data.length - 1].pace;
  const prevPace = data[data.length - 2].pace;

  const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });

  return (
    <div style={{ background: "#f1f5f9", borderRadius: 10, padding: "12px 14px", marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <span style={{ fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.07em" }}>HR vs Pace</span>
        <div style={{ display: "flex", gap: 12 }}>
          <span style={{ fontSize: 12, color: "#ea580c", fontWeight: 700 }}>
            {latestHR < prevHR ? "↓" : latestHR > prevHR ? "↑" : "→"} {latestHR.toFixed(0)} bpm
          </span>
          <span style={{ fontSize: 12, color: "#2563eb", fontWeight: 700 }}>
            {latestPace < prevPace ? "↑" : latestPace > prevPace ? "↓" : "→"} {secondsToPace(latestPace)}/km
          </span>
        </div>
      </div>
      <svg width={W} height={H} style={{ overflow: "visible", width: "100%" }} onClick={() => setActiveIndex(null)}>
        <polyline points={hrPts.join(" ")} fill="none" stroke="#ea580c" strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
        <polyline points={pacePts.join(" ")} fill="none" stroke="#2563eb" strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" strokeDasharray="4 2" />
        {data.map((d, i) => {
          const x = PAD + (i / (data.length - 1)) * (W - PAD * 2);
          const hrY = PAD + (1 - (d.hr - hrMin) / hrRange) * (H - PAD * 2);
          const paceY = PAD + ((d.pace - paceMin) / paceRange) * (H - PAD * 2);
          const active = activeIndex === i;
          const topY = Math.min(hrY, paceY);
          const boxY = topY > 34 ? topY - 34 : Math.max(hrY, paceY) + 10;
          return (
            <g key={i}>
              {active && (
                <>
                  <line x1={x} y1={0} x2={x} y2={H} stroke="#94a3b8" strokeWidth={1} strokeDasharray="3 3" opacity={0.5} />
                  <rect x={Math.min(Math.max(x - 34, 0), W - 68)} y={boxY} width={68} height={34} rx={5} fill="#0f172a" />
                  <text x={Math.min(Math.max(x, 34), W - 34)} y={boxY + 13} textAnchor="middle" fontSize={10} fontWeight={700} fill="#fb923c">
                    {d.hr.toFixed(0)} bpm
                  </text>
                  <text x={Math.min(Math.max(x, 34), W - 34)} y={boxY + 25} textAnchor="middle" fontSize={10} fontWeight={700} fill="#60a5fa">
                    {secondsToPace(d.pace)}/km
                  </text>
                </>
              )}
              <circle cx={x} cy={hrY} r={active ? 5 : 3} fill="#ea580c" stroke={active ? "#ffffff" : "none"} strokeWidth={active ? 1.5 : 0} />
              <circle cx={x} cy={paceY} r={active ? 5 : 3} fill="#2563eb" stroke={active ? "#ffffff" : "none"} strokeWidth={active ? 1.5 : 0} />
              <circle
                cx={x} cy={hrY} r={14} fill="rgba(0,0,0,0.001)"
                onClick={(e) => { e.stopPropagation(); setActiveIndex(active ? null : i); }}
                style={{ cursor: "pointer", pointerEvents: "all" }}
              />
              <circle
                cx={x} cy={paceY} r={14} fill="rgba(0,0,0,0.001)"
                onClick={(e) => { e.stopPropagation(); setActiveIndex(active ? null : i); }}
                style={{ cursor: "pointer", pointerEvents: "all" }}
              />
            </g>
          );
        })}
      </svg>
      <div style={{ display: "flex", gap: 16, marginTop: 6, justifyContent: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: "#64748b" }}>
          <div style={{ width: 16, height: 2, background: "#ea580c", borderRadius: 1 }} /> HR
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: "#64748b" }}>
          <div style={{ width: 16, height: 2, background: "#2563eb", borderRadius: 1, borderTop: "2px dashed #2563eb" }} /> Pace
        </div>
      </div>
    </div>
  );
}

  const zone = run.avgHR ? getHRZone(run.avgHR) : null;
  const efficiency = calcEfficiency(run);
  const effPct = efficiency ? getEfficiencyPct(efficiency) : null;
  const effRating = effPct ? getEfficiencyRating(effPct) : null;
  const accent = typeAccent[run.type] || "#94a3b8";

                {n}
              </button>
            );
          })}
        </div>
        <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 5 }}>
          1–3 easy · 4–5 moderate · 6–7 hard · 8–9 very hard · 10 max
        </div>
      </div>

      <div style={fieldStyle}>
        <label style={labelStyle}>Comments</label>
        <textarea style={{ ...inputStyle, height: 70, resize: "vertical" }} value={form.comments} onChange={(e) => set("comments", e.target.value)} placeholder="How did it feel? Any notes..." />
      </div>

      <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
        <button onClick={handleSave} style={{ flex: 1, background: "#2563eb", color: "#fff", border: "none", borderRadius: 8, padding: "10px", fontSize: 14, fontWeight: 700, cursor: "pointer", letterSpacing: "0.05em" }}>
          {initialRun ? "Update Run" : "Save Run"}
        </button>
        <button onClick={onCancel} style={{ background: "none", border: "1px solid #e2e8f0", color: "#64748b", borderRadius: 8, padding: "10px 16px", fontSize: 14, cursor: "pointer" }}>
          Cancel
        </button>
      </div>
    </div>
  );
}

function RunTypePanel({ type, runs }) {
  const [adding, setAdding] = useState(false);
  const [editingRun, setEditingRun] = useState(null);
  const [allRuns, setAllRuns] = useState(runs);

  useEffect(() => { setAllRuns(runs); }, [runs]);

  const handleSave = async (run) => {
    const all = loadRuns();
    all.push(run);
    saveRuns(all);
    setAllRuns(all.filter((r) => r.type === type));
    setAdding(false);
    window.dispatchEvent(new Event("runs-updated"));
    await saveRunToSheet(run);
  };

  const handleEdit = (run) => {
    setEditingRun(run);
    setAdding(false);
  };

  const handleUpdate = async (updatedRun) => {
    const all = loadRuns().filter((r) => String(r.id) !== String(updatedRun.id));
    all.push(updatedRun);
    saveRuns(all);
    setAllRuns(all.filter((r) => r.type === type));
    setEditingRun(null);
    window.dispatchEvent(new Event("runs-updated"));
    await deleteRunFromSheet(updatedRun.id);
    await saveRunToSheet(updatedRun);
  };

  const handleDelete = async (id) => {
    if (!confirm("Delete this run?")) return;
    const all = loadRuns().filter((r) => String(r.id) !== String(id));
    saveRuns(all);
    setAllRuns(all.filter((r) => r.type === type));
    window.dispatchEvent(new Event("runs-updated"));
    await deleteRunFromSheet(id);
  };

  const typeRuns = allRuns.filter((r) => r.type === type).sort((a, b) => b.date.localeCompare(a.date));

  const avg = (field) => {
    const vals = typeRuns.map((r) => parseFloat(r[field])).filter((v) => !isNaN(v));
    return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
  };

  const typeColors = { Easy: "#16a34a", Tempo: "#d97706", Long: "#7c3aed" };
  const color = typeColors[type];

  const avgPaceDisplay = (() => {
    const paces = typeRuns.map((r) => paceToSeconds(r.avgPace)).filter((v) => v);
    return paces.length ? secondsToPace(paces.reduce((a, b) => a + b, 0) / paces.length) : null;
  })();

  return (
    <div>
      {/* Summary bar */}
      {typeRuns.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>
            Averages across {typeRuns.length} {type.toLowerCase()} run{typeRuns.length !== 1 ? "s" : ""}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            <StatBadge label="Avg HR" value={avg("avgHR")} unit="bpm" />
            <StatBadge label="Avg Pace" value={avgPaceDisplay} unit="/km" />
            <StatBadge label="Cadence" value={avg("avgCadence")} unit="spm" />
            <StatBadge label="Distance" value={avg("distance")} unit="km" />
          </div>
        </div>
      )}

      {/* Trend charts */}
      {typeRuns.length >= 2 && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>Trends (last 10)</div>
          {typeRuns.some(r => calcEfficiency(r)) && (
            <MiniChart
              runs={[...typeRuns].reverse().map(r => ({ ...r, effPct: getEfficiencyPct(calcEfficiency(r)) }))}
              field="effPct"
              label="Efficiency % (95% = 3:45 target)"
              unit="%"
            />
          )}
          <MiniChart runs={[...typeRuns].reverse()} field="avgCadence" label="Cadence" unit="spm" />
        </div>
      )}

      {/* Add button */}
      {!adding && !editingRun && (
        <button
          onClick={() => setAdding(true)}
          style={{ width: "100%", background: "none", border: `1.5px dashed ${color}`, color: color, borderRadius: 10, padding: "12px", fontSize: 14, fontWeight: 600, cursor: "pointer", marginBottom: 16, letterSpacing: "0.05em" }}
        >
          + Log {type} Run
        </button>
      )}

      {adding && <div style={{ marginBottom: 16 }}><RunForm type={type} onSave={handleSave} onCancel={() => setAdding(false)} /></div>}

      {editingRun && <div style={{ marginBottom: 16 }}><RunForm type={type} onSave={handleUpdate} onCancel={() => setEditingRun(null)} initialRun={editingRun} /></div>}

      {/* Run history */}
      {typeRuns.length === 0 && !adding && !editingRun && (
        <div style={{ textAlign: "center", color: "#94a3b8", padding: "40px 0", fontSize: 14 }}>
          No {type.toLowerCase()} runs logged yet. Add your first one above.
        </div>
      )}
      {typeRuns.map((r) => <RunCard key={r.id} run={r} onDelete={handleDelete} onEdit={handleEdit} />)}
    </div>
  );
}

function SummaryPanel({ runs }) {
  const typeColors = { Easy: "#16a34a", Tempo: "#d97706", Long: "#7c3aed" };
  const weeklyKms = getWeeklyKm(runs);

  // Build last 12 weeks of data
  const today = new Date();
  const todayDay = today.getDay();
  const diff = (todayDay - WEEK_START + 7) % 7;
  const thisMonday = new Date(today);
  thisMonday.setDate(today.getDate() - diff);

  const weeks = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(thisMonday);
    d.setDate(thisMonday.getDate() - i * 7);
    const key = d.toISOString().slice(0, 10);
    const label = `${d.getDate()}/${d.getMonth() + 1}`;
    const km = weeklyKms[key] || 0;

    // km by type
    const byType = { Easy: 0, Tempo: 0, Long: 0 };
    runs.forEach((r) => {
      if (!r.distance || !r.date) return;
      const rd = new Date(r.date + "T00:00:00");
      const rdDay = rd.getDay();
      const rdDiff = (rdDay - WEEK_START + 7) % 7;
      const rdMonday = new Date(rd);
      rdMonday.setDate(rd.getDate() - rdDiff);
      if (rdMonday.toISOString().slice(0, 10) === key) {
        byType[r.type] = (byType[r.type] || 0) + parseFloat(r.distance);
      }
    });

    weeks.push({ key, label, km, byType });
  }

  const maxKm = Math.max(...weeks.map((w) => w.km), 10);
  const totalRuns = runs.length;
  const totalKm = runs.reduce((a, r) => a + (parseFloat(r.distance) || 0), 0);
  const avgKmPerRun = totalRuns ? (totalKm / totalRuns).toFixed(1) : 0;

  // Avg RPE by type
  const rpeByType = {};
  ["Easy", "Tempo", "Long"].forEach((t) => {
    const typed = runs.filter((r) => r.type === t && r.rpe);
    rpeByType[t] = typed.length ? (typed.reduce((a, r) => a + parseInt(r.rpe), 0) / typed.length).toFixed(1) : null;
  });

  // Recent 4 weeks trend
  const recent4 = weeks.slice(-4).map((w) => w.km);
  const trend = recent4.length >= 2 ? recent4[recent4.length - 1] - recent4[0] : 0;

  // Race prediction calculation - weighted by run type
  const GOAL_A_SECS = 3 * 3600 + 45 * 60; // 3:45:00
  const GOAL_B_SECS = 3 * 3600 + 52 * 60; // 3:52:00
  const GOAL_A_PACE = GOAL_A_SECS / 42.195; // sec/km
  const GOAL_B_PACE = GOAL_B_SECS / 42.195;

  const TYPE_WEIGHTS = { Long: 0.5, Tempo: 0.35, Easy: 0.15 };

  const recentByType = {};
  ["Easy", "Tempo", "Long"].forEach((t) => {
    recentByType[t] = runs
      .filter((r) => r.type === t && r.avgPace && r.avgHR)
      .sort((a, b) => b.date.localeCompare(a.date))
      .slice(0, 4);
  });

  const totalWeightedRuns = Object.entries(recentByType).reduce((a, [t, rs]) => a + rs.length * TYPE_WEIGHTS[t], 0);

  let likelihood = null;
  let predictionNote = "";

  const allRecentRuns = Object.values(recentByType).flat();

  if (allRecentRuns.length >= 2) {
    let weightedPace = 0, weightedHR = 0, totalWeight = 0;

    Object.entries(recentByType).forEach(([t, rs]) => {
      if (!rs.length) return;
      const w = TYPE_WEIGHTS[t];
      const avgP = rs.reduce((a, r) => a + paceToSeconds(r.avgPace), 0) / rs.length;
      const avgH = rs.reduce((a, r) => a + parseFloat(r.avgHR), 0) / rs.length;
      weightedPace += avgP * w * rs.length;
      weightedHR += avgH * w * rs.length;
      totalWeight += w * rs.length;
    });

    weightedPace /= totalWeight;
    weightedHR /= totalWeight;

    const hrScore = weightedHR < 148 ? 1 : weightedHR < 158 ? 0.75 : weightedHR < 165 ? 0.5 : 0.25;
    const paceRatio = GOAL_A_PACE / weightedPace;
    const paceScore = paceRatio >= 1 ? 1 : paceRatio >= 0.9 ? 0.7 : paceRatio >= 0.8 ? 0.4 : 0.2;

    // Trend bonus from long runs specifically
    const longRuns = recentByType["Long"];
    let trendBonus = 0;
    if (longRuns.length >= 2) {
      const older = longRuns.slice(Math.floor(longRuns.length / 2));
      const newer = longRuns.slice(0, Math.floor(longRuns.length / 2));
      const hrTrend = older.reduce((a, r) => a + parseFloat(r.avgHR), 0) / older.length -
                      newer.reduce((a, r) => a + parseFloat(r.avgHR), 0) / newer.length;
      trendBonus = hrTrend > 2 ? 0.1 : hrTrend < -2 ? -0.1 : 0;
    }

    likelihood = Math.min(Math.max(Math.round((hrScore * 0.5 + paceScore * 0.5 + trendBonus) * 100), 5), 95);

    const typesUsed = Object.entries(recentByType).filter(([, rs]) => rs.length).map(([t]) => t).join(", ");
    predictionNote = `Weighted avg pace ${secondsToPace(weightedPace)}/km · Avg HR ${weightedHR.toFixed(0)} bpm · Based on: ${typesUsed}`;
  }

  // Race Efficiency (current form) — rolling weighted avg of last 4 Tempo + Long runs, combined 35/65
  const TYPE_EFF_WEIGHTS = { Tempo: 0.35, Long: 0.65 };
  let overallEff = null;
  let overallBest = null;
  {
    let totalEffWeight = 0, weightedEffSum = 0;
    let totalBestWeight = 0, weightedBestSum = 0;
    ["Tempo", "Long"].forEach((t) => {
      const typeRuns = runs.filter((r) => r.type === t);
      const rollingPct = getRollingEfficiencyPct(typeRuns);
      if (rollingPct !== null) {
        weightedEffSum += rollingPct * TYPE_EFF_WEIGHTS[t];
        totalEffWeight += TYPE_EFF_WEIGHTS[t];
      }
      const scores = typeRuns.map((r) => calcEfficiency(r)).filter((s) => s !== null);
      if (scores.length) {
        const bestPct = getEfficiencyPct(Math.max(...scores));
        weightedBestSum += bestPct * TYPE_EFF_WEIGHTS[t];
        totalBestWeight += TYPE_EFF_WEIGHTS[t];
      }
    });
    if (totalEffWeight > 0) overallEff = Math.round(weightedEffSum / totalEffWeight);
    if (totalBestWeight > 0) overallBest = Math.round(weightedBestSum / totalBestWeight);
  }

  // Easy Efficiency (current form) — rolling weighted avg of last 4 Easy runs
  const easyRuns = runs.filter((r) => r.type === "Easy");
  const easyEff = getRollingEfficiencyPct(easyRuns);
  const easyEffRating = easyEff ? getEfficiencyRating(easyEff) : null;
  const easyScoresAll = easyRuns.map((r) => calcEfficiency(r)).filter((s) => s !== null);
  const easyBest = easyScoresAll.length ? getEfficiencyPct(Math.max(...easyScoresAll)) : null;

  const overallEffRating = overallEff ? getEfficiencyRating(overallEff) : null;

  const likelihoodColor = likelihood >= 70 ? "#16a34a" : likelihood >= 45 ? "#d97706" : "#dc2626";

  return (
    <div>
      {/* Efficiency ratings */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        {easyEff && easyEffRating && (
          <div className="card-shadow" style={{ flex: 1, background: "#ffffff", borderRadius: 10, padding: "14px", border: `1px solid ${easyEffRating.color}66`, textAlign: "center" }}>
            <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>Easy Efficiency</div>
            <div style={{ fontSize: 40, fontWeight: 800, color: easyEffRating.color, fontFamily: "monospace", lineHeight: 1 }}>{easyEff}%</div>
            <div style={{ fontSize: 12, color: easyEffRating.color, marginTop: 4 }}>{easyEffRating.label}</div>
            {easyBest !== null && <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 6 }}>Best: {easyBest}%</div>}
            <div style={{ fontSize: 9, color: "#94a3b8", marginTop: 4 }}>95% = 6:20 @ Z2 + cadence</div>
          </div>
        )}
        {overallEff !== null && overallEffRating && (
          <div className="card-shadow" style={{ flex: 1, background: "#ffffff", borderRadius: 10, padding: "14px", border: `1px solid ${overallEffRating.color}66`, textAlign: "center" }}>
            <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>Race Efficiency</div>
            <div style={{ fontSize: 40, fontWeight: 800, color: overallEffRating.color, fontFamily: "monospace", lineHeight: 1 }}>{overallEff}%</div>
            <div style={{ fontSize: 12, color: overallEffRating.color, marginTop: 4 }}>{overallEffRating.label}</div>
            {overallBest !== null && <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 6 }}>Best: {overallBest}%</div>}
            <div style={{ fontSize: 9, color: "#94a3b8", marginTop: 4 }}>95% = on track for 3:45</div>
          </div>
        )}
        {!easyEff && !overallEff && (
          <div style={{ flex: 1, background: "#f1f5f9", borderRadius: 10, padding: "20px", textAlign: "center" }}>
            <div style={{ fontSize: 12, color: "#94a3b8" }}>Log runs with pace + HR to see efficiency</div>
          </div>
        )}
      </div>
      {/* Race prediction */}
      <div style={{ background: "#f1f5f9", borderRadius: 10, padding: "14px", marginBottom: 20, border: "1px solid #e2e8f0" }}>
        <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Race Prediction · Oct 25</div>
        <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
          <div style={{ flex: 1, background: "#ffffff", borderRadius: 8, padding: "10px", textAlign: "center", border: "1px solid #16a34a33" }}>
            <div style={{ fontSize: 10, color: "#16a34a", marginBottom: 4 }}>A GOAL</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#0f172a", fontFamily: "monospace" }}>3:45:00</div>
            <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>{secondsToPace(GOAL_A_PACE)}/km</div>
          </div>
          <div style={{ flex: 1, background: "#ffffff", borderRadius: 8, padding: "10px", textAlign: "center", border: "1px solid #d9770633" }}>
            <div style={{ fontSize: 10, color: "#d97706", marginBottom: 4 }}>B GOAL</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#0f172a", fontFamily: "monospace" }}>3:52:00</div>
            <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>{secondsToPace(GOAL_B_PACE)}/km</div>
          </div>
          {likelihood !== null && (
            <div style={{ flex: 1, background: "#ffffff", borderRadius: 8, padding: "10px", textAlign: "center", border: `1px solid ${likelihoodColor}33` }}>
              <div style={{ fontSize: 10, color: likelihoodColor, marginBottom: 4 }}>A GOAL ODDS</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: likelihoodColor, fontFamily: "monospace" }}>{likelihood}%</div>
            </div>
          )}
        </div>
        {likelihood !== null && (
          <div style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.5 }}>{predictionNote}</div>
        )}
        {likelihood === null && (
          <div style={{ fontSize: 12, color: "#94a3b8" }}>Log at least 2 runs with pace and HR to see your prediction.</div>
        )}
      </div>

      {/* Top stats */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        <StatBadge label="Total Runs" value={totalRuns} />
        <StatBadge label="Total km" value={totalKm.toFixed(1)} />
        <StatBadge label="Avg km/run" value={avgKmPerRun} />
        <div style={{ textAlign: "center", padding: "10px 14px", background: "#f1f5f9", borderRadius: 8, minWidth: 80 }}>
          <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>4wk trend</div>
          <div style={{ fontSize: 20, fontWeight: 700, color: trend >= 0 ? "#16a34a" : "#dc2626", fontFamily: "monospace" }}>
            {trend >= 0 ? "+" : ""}{trend.toFixed(1)}
          </div>
        </div>
      </div>

      {/* Weight trend */}
      {runs.filter((r) => r.type === "Long" && r.weight).length >= 2 && (
        <div style={{ marginBottom: 20 }}>
          <MiniChart
            runs={runs.filter((r) => r.type === "Long" && r.weight).sort((a, b) => a.date.localeCompare(b.date))}
            field="weight"
            label="Weight (lbs) — Long run"
            unit="lbs"
            reverse={true}
          />
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#94a3b8", marginTop: 4, paddingLeft: 2 }}>
            <span>Start: 189 lbs</span>
            <span>Target: 180 lbs</span>
          </div>
        </div>
      )}


      {/* VO2 Max trend */}
      {runs.filter((r) => r.type === "Long" && r.vo2max).length >= 2 && (
        <div style={{ marginBottom: 20 }}>
          <MiniChart
            runs={runs.filter((r) => r.type === "Long" && r.vo2max).sort((a, b) => a.date.localeCompare(b.date))}
            field="vo2max"
            label="VO2 Max (Apple Watch)"
            unit=""
          />
        </div>
      )}

      {/* Efficiency personal bests */}
      {runs.length >= 2 && (
        <div style={{ background: "#f1f5f9", borderRadius: 10, padding: "14px", marginBottom: 20 }}>
          <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Personal Bests</div>
          <div style={{ display: "flex", gap: 8 }}>
            {["Easy", "Tempo", "Long"].map((t) => {
              const typeRuns = runs.filter((r) => r.type === t);
              const scores = typeRuns.map((r) => calcEfficiency(r)).filter((s) => s !== null);
              const best = scores.length ? Math.max(...scores) : null;
              const bestPct = best ? getEfficiencyPct(best) : null;
              const bestRun = best ? typeRuns.find((r) => calcEfficiency(r) === best) : null;
              const rating = bestPct ? getEfficiencyRating(bestPct) : null;
              const typeColors = { Easy: "#16a34a", Tempo: "#d97706", Long: "#7c3aed" };
              return (
                <div key={t} style={{ flex: 1, background: "#ffffff", borderRadius: 8, padding: "10px 8px", textAlign: "center", border: `1px solid ${typeColors[t]}33` }}>
                  <div style={{ fontSize: 11, color: typeColors[t], marginBottom: 4 }}>{t}</div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: rating ? rating.color : "#94a3b8", fontFamily: "monospace" }}>{bestPct ? `${bestPct}%` : "--"}</div>
                  {rating && <div style={{ fontSize: 10, color: rating.color, marginTop: 2 }}>{rating.label}</div>}
                  {bestRun && <div style={{ fontSize: 9, color: "#94a3b8", marginTop: 2 }}>{bestRun.date}</div>}
                </div>
              );
            })}
          </div>
          <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 10 }}>Easy: 95% = 6:20/km at Z2 · Tempo: 95% = predicted 10km pace · Long: 95% = predicted marathon pace</div>
        </div>
      )}


      <div style={{ background: "#f1f5f9", borderRadius: 10, padding: "14px", marginBottom: 20 }}>
        <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 14 }}>Weekly km — last 12 weeks</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 100 }}>
          {weeks.map((w, i) => {
            const isThisWeek = i === weeks.length - 1;
            const barH = w.km ? Math.max((w.km / maxKm) * 88, 4) : 0;
            // Stacked segments
            const easyH = w.byType.Easy ? (w.byType.Easy / maxKm) * 88 : 0;
            const tempoH = w.byType.Tempo ? (w.byType.Tempo / maxKm) * 88 : 0;
            const longH = w.byType.Long ? (w.byType.Long / maxKm) * 88 : 0;
            return (
              <div key={w.key} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <div style={{ fontSize: 9, color: isThisWeek ? "#0f172a" : "#94a3b8", fontWeight: isThisWeek ? 700 : 400 }}>
                  {w.km > 0 ? w.km.toFixed(0) : ""}
                </div>
                <div style={{ width: "100%", display: "flex", flexDirection: "column", justifyContent: "flex-end", height: 88, gap: 1 }}>
                  {longH > 0 && <div style={{ height: longH, background: typeColors.Long, borderRadius: 2, opacity: isThisWeek ? 1 : 0.7 }} />}
                  {tempoH > 0 && <div style={{ height: tempoH, background: typeColors.Tempo, borderRadius: 2, opacity: isThisWeek ? 1 : 0.7 }} />}
                  {easyH > 0 && <div style={{ height: easyH, background: typeColors.Easy, borderRadius: 2, opacity: isThisWeek ? 1 : 0.7 }} />}
                  {w.km === 0 && <div style={{ height: 3, background: "#e2e8f0", borderRadius: 2 }} />}
                </div>
                <div style={{ fontSize: 8, color: isThisWeek ? "#64748b" : "#cbd5e1", textAlign: "center" }}>{w.label}</div>
              </div>
            );
          })}
        </div>
        {/* Legend */}
        <div style={{ display: "flex", gap: 12, marginTop: 10, justifyContent: "center" }}>
          {Object.entries(typeColors).map(([t, c]) => (
            <div key={t} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: "#64748b" }}>
              <div style={{ width: 8, height: 8, background: c, borderRadius: 2 }} />{t}
            </div>
          ))}
        </div>
      </div>

      {/* RPE by type */}
      {Object.values(rpeByType).some(Boolean) && (
        <div style={{ background: "#f1f5f9", borderRadius: 10, padding: "14px", marginBottom: 20 }}>
          <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Avg RPE by run type</div>
          <div style={{ display: "flex", gap: 8 }}>
            {["Easy", "Tempo", "Long"].map((t) => rpeByType[t] && (
              <div key={t} style={{ flex: 1, textAlign: "center", background: "#ffffff", borderRadius: 8, padding: "10px 8px", border: `1px solid ${typeColors[t]}33` }}>
                <div style={{ fontSize: 11, color: typeColors[t], marginBottom: 4 }}>{t}</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#0f172a", fontFamily: "monospace" }}>{rpeByType[t]}</div>
                <div style={{ fontSize: 10, color: "#94a3b8" }}>/10</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {runs.length === 0 && (
        <div style={{ textAlign: "center", color: "#94a3b8", padding: "40px 0", fontSize: 14 }}>
          No runs logged yet. Start logging to see your summary.
        </div>
      )}
    </div>
  );
}

function PlanPanel({ runs }) {
  const typeColors = { Easy: "#16a34a", Tempo: "#d97706", Long: "#7c3aed" };
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const runsByType = { Easy: [], Tempo: [], Long: [] };
  runs.forEach((r) => { if (runsByType[r.type]) runsByType[r.type].push(r); });

  const phaseColors = {
    Base: "#2563eb", Cutback: "#64748b", Build: "#d97706",
    Peak: "#dc2626", "Final Peak": "#dc2626", Taper: "#16a34a", Race: "#7c3aed",
  };

  const [openWeek, setOpenWeek] = useState(null);

  useEffect(() => {
    // auto-open current week on first load
    for (const w of PLAN_WEEKS) {
      const dates = planWeekDates(w);
      if (dates.some((s) => s.date >= today && s.date <= new Date(today.getTime() + 7 * 86400000))) {
        setOpenWeek(w.week);
        break;
      }
    }
    // eslint-disable-next-line
  }, []);

  return (
    <div style={{ background: "#ffffff", borderRadius: 14, padding: 14, margin: "-6px -4px" }}>
      <div style={{ background: "#f1f5f9", borderRadius: 10, padding: "12px 14px", marginBottom: 16, border: "1px solid #e2e8f0", fontSize: 12, color: "#475569", lineHeight: 1.5 }}>
        Pace targets adjust automatically as your logged efficiency changes — HR targets stay fixed since they're safety and pacing-discipline boundaries, not fitness goals. Adjustments are capped at ±10% and need at least 2 logged runs of a type to kick in.
      </div>

      {PLAN_WEEKS.map((w) => {
        const dates = planWeekDates(w);
        const weekEnd = dates[dates.length - 1].date;
        const weekStart = dates[0].date;
        const isPast = weekEnd < today;
        const color = phaseColors[w.phase] || "#2563eb";
        const isOpen = openWeek === w.week;

        return (
          <div key={w.week} className={isPast ? "" : "card-shadow"} style={{ background: isPast ? "#f8fafc" : "#ffffff", borderRadius: 10, marginBottom: 8, border: "1px solid #e2e8f0", overflow: "hidden" }}>
            <div onClick={() => setOpenWeek(isOpen ? null : w.week)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", cursor: "pointer" }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#fff", background: color, borderRadius: 5, padding: "3px 8px", letterSpacing: "0.04em" }}>W{w.week}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: isPast ? "#94a3b8" : "#0f172a" }}>{w.focus}</div>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#64748b", marginTop: 1 }}>{w.phase} · {fmtShortDate(weekStart)} – {fmtShortDate(weekEnd)}</div>
              </div>
              <span style={{ fontSize: 14, color: "#2563eb" }}>{isOpen ? "▲" : "▼"}</span>
            </div>
            <div className={`collapse${isOpen ? " open" : ""}`}>
              <div>
              <div style={{ padding: "0 14px 14px" }}>
                {dates.map((session, i) => {
                  const sessionPast = session.date < today;
                  const adj = getAdjustedSession(session, runsByType[session.type] || []);
                  const typeColor = session.type === "Race" ? "#7c3aed" : (typeColors[session.type] || "#64748b");
                  return (
                    <div key={i} style={{
                      marginTop: 10, padding: "10px 12px",
                      background: typeColor + "16", borderLeft: `3px solid ${typeColor}`, borderRadius: 6,
                      opacity: sessionPast ? 0.6 : 1,
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 5 }}>
                        <div style={{ fontSize: 13, fontWeight: 800, color: typeColor }}>{session.label}</div>
                        <div style={{ fontSize: 11, fontWeight: 600, color: "#64748b" }}>{fmtShortDate(session.date)}</div>
                      </div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#0f172a", marginBottom: 4 }}>
                        {session.distance && `${session.distance}km`}
                        {session.paceSec && !adj.adjusted && ` @ ${secondsToPace(session.paceSec)}/km`}
                        {adj.adjusted && (
                          <>
                            {" "}<span style={{ textDecoration: "line-through", color: "#94a3b8", fontWeight: 500 }}>{secondsToPace(session.paceSec)}/km</span>
                            {" → "}
                            <span style={{ color: "#15803d", fontWeight: 800 }}>{secondsToPace(adj.adjustedPaceSec)}/km</span>
                          </>
                        )}
                        {session.hrUnder && <span style={{ color: "#334155" }}> · HR &lt; {session.hrUnder}</span>}
                        {session.hrRange && <span style={{ color: "#334155" }}> · HR {session.hrRange[0]}–{session.hrRange[1]}</span>}
                      </div>
                      {adj.adjusted && !sessionPast && (
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#15803d", marginBottom: 4 }}>↳ {adj.reason}</div>
                      )}
                      {adj.reason && !adj.adjusted && !sessionPast && (
                        <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4 }}>↳ {adj.reason}</div>
                      )}
                      {session.note && (
                        <div style={{ fontSize: 12, color: "#475569", lineHeight: 1.45 }}>{session.note}</div>
                      )}
                    </div>
                  );
                })}
              </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState("Easy");
  const [runs, setRuns] = useState(loadRuns());
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetchRunsFromSheet().then((r) => {
      setRuns(r);
      setLoading(false);
    });
    const handler = () => setRuns(loadRuns());
    window.addEventListener("runs-updated", handler);
    return () => window.removeEventListener("runs-updated", handler);
  }, []);

  const typeColors = { Easy: "#16a34a", Tempo: "#d97706", Long: "#7c3aed" };
  const totalKm = runs.reduce((a, r) => a + (parseFloat(r.distance) || 0), 0);
  const days = daysToRace();
  const trainingWeek = getTrainingWeek();
  const shoeKms = shoeKm(runs);
  const SHOE_LIMIT = 700;
  const weeklyKms = getWeeklyKm(runs);
  // Recent avg cadence by run type
  const recentCadenceByType = {};
  ["Easy", "Tempo", "Long"].forEach((t) => {
    const recent = runs.filter((r) => r.type === t && r.avgCadence)
      .sort((a, b) => b.date.localeCompare(a.date)).slice(0, 3);
    recentCadenceByType[t] = recent.length
      ? Math.round(recent.reduce((a, r) => a + parseFloat(r.avgCadence), 0) / recent.length)
      : null;
  });

  // Current week key (Monday)
  const todayD = new Date();
  const todayDay = todayD.getDay();
  const diff = (todayDay - WEEK_START + 7) % 7;
  const thisMonday = new Date(todayD);
  thisMonday.setDate(todayD.getDate() - diff);
  const thisWeekKey = thisMonday.toISOString().slice(0, 10);
  const thisWeekKm = weeklyKms[thisWeekKey] || 0;

  return (
    <div style={{ minHeight: "100vh", background: "#f8fafc", color: "#0f172a", fontFamily: "'Inter', system-ui, sans-serif" }}>
      {/* Header */}
      <div style={{ background: "#ffffff", borderBottom: "1px solid #e2e8f0", padding: "16px 20px 0" }}>
        <div style={{ maxWidth: 560, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 12 }}>
            <div>
              <div style={{ fontSize: 20, fontWeight: 800, color: "#0f172a", letterSpacing: "-0.02em" }}>Training Log</div>
              <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>
                Niagara Falls Marathon · Oct 25, 2026
                {loading && <span style={{ marginLeft: 8, color: "#2563eb" }}>⟳ syncing...</span>}
              </div>
              {trainingWeek && (
                <div style={{ marginTop: 4, fontSize: 11, color: "#2563eb", fontWeight: 700, letterSpacing: "0.05em" }}>
                  WEEK {trainingWeek} OF 17
                </div>
              )}
            </div>
            <div style={{ textAlign: "right" }}>
              {(() => {
                const totalPlanDays = Math.round((RACE_DATE - PLAN_START) / 86400000);
                const elapsedDays = totalPlanDays - days;
                const progress = Math.min(Math.max(elapsedDays / totalPlanDays, 0), 1);
                const ringColor = days < 30 ? "#dc2626" : days < 60 ? "#d97706" : "#2563eb";
                const size = 58, sw = 5, r = (size - sw) / 2, circ = 2 * Math.PI * r;
                return (
                  <div style={{ position: "relative", width: size, height: size }}>
                    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
                      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#e2e8f0" strokeWidth={sw} />
                      <circle
                        cx={size / 2} cy={size / 2} r={r} fill="none" stroke={ringColor} strokeWidth={sw}
                        strokeDasharray={circ} strokeDashoffset={circ * (1 - progress)} strokeLinecap="round"
                        style={{ transition: "stroke-dashoffset 0.4s ease" }}
                      />
                    </svg>
                    <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                      <div style={{ fontSize: 17, fontWeight: 700, color: ringColor, fontFamily: "monospace", lineHeight: 1 }}>{days}</div>
                    </div>
                  </div>
                );
              })()}
              <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 2 }}>Days to race</div>
            </div>
          </div>

          {/* Stats row */}
          <div style={{ display: "flex", gap: 12, marginBottom: 12, fontSize: 12, flexWrap: "wrap", alignItems: "center" }}>
            <div style={{ color: "#64748b" }}>This week: <span style={{ color: "#0f172a", fontWeight: 600 }}>{thisWeekKm.toFixed(1)} km</span></div>
            <div style={{ color: "#cbd5e1" }}>|</div>
            <div style={{ color: "#64748b" }}>Total: <span style={{ color: "#0f172a", fontWeight: 600 }}>{totalKm.toFixed(1)} km</span></div>
            <div style={{ color: "#cbd5e1" }}>|</div>
            {Object.entries(recentCadenceByType).some(([, v]) => v) && (
              <>
                {["Easy", "Tempo", "Long"].map((t) => {
                  const cadence = recentCadenceByType[t];
                  const target = CADENCE_TARGETS[t];
                  if (!cadence) return null;
                  const onTarget = cadence >= target;
                  const shortLabel = t === "Easy" ? "E" : t === "Tempo" ? "T" : "L";
                  return (
                    <div key={t} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ fontSize: 10, color: onTarget ? "#16a34a" : "#d97706" }}>
                        {shortLabel}:{cadence}
                      </span>
                      <div style={{ width: 24, height: 3, background: "#e2e8f0", borderRadius: 2, overflow: "hidden" }}>
                        <div style={{ width: `${Math.min(cadence / target, 1) * 100}%`, height: "100%", background: onTarget ? "#16a34a" : "#d97706", borderRadius: 2 }} />
                      </div>
                    </div>
                  );
                })}
                <div style={{ color: "#cbd5e1" }}>|</div>
              </>
            )}
            {SHOES.filter(s => s !== "Other").map((shoe) => {
              const km = shoeKms[shoe] || 0;
              const pct = Math.min(km / SHOE_LIMIT, 1);
              const warn = pct > 0.85;
              const shortName = shoe.replace("Kayano ", "K");
              return (
                <div key={shoe} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ color: warn ? "#d97706" : "#64748b" }}>👟 {shortName}</span>
                  <div style={{ width: 40, height: 4, background: "#e2e8f0", borderRadius: 2, overflow: "hidden" }}>
                    <div style={{ width: `${pct * 100}%`, height: "100%", background: warn ? "#d97706" : "#2563eb", borderRadius: 2 }} />
                  </div>
                  <span style={{ color: warn ? "#d97706" : "#94a3b8", fontSize: 11 }}>{km.toFixed(0)} km</span>
                </div>
              );
            })}
          </div>
          {/* Tabs */}
          <div style={{ display: "flex", gap: 4 }}>
            {[...RUN_TYPES, "Plan", "Summary"].map((t) => {
              const count = RUN_TYPES.includes(t) ? runs.filter((r) => r.type === t).length : null;
              const active = activeTab === t;
              const color = t === "Summary" ? "#0284c7" : t === "Plan" ? "#7c3aed" : typeColors[t];
              return (
                <button
                  key={t}
                  onClick={() => setActiveTab(t)}
                  style={{
                    flex: 1, background: "none", border: "none", borderBottom: active ? `2px solid ${color}` : "2px solid transparent",
                    color: active ? color : "#94a3b8", padding: "8px 4px 10px", fontSize: 13, fontWeight: active ? 700 : 500,
                    cursor: "pointer", transition: "all 0.15s",
                  }}
                >
                  {t} {count > 0 && <span style={{ fontSize: 10, opacity: 0.7 }}>({count})</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 560, margin: "0 auto", padding: "20px 16px 40px" }}>
        {activeTab === "Summary" && <SummaryPanel runs={runs} />}
        {activeTab === "Plan" && <PlanPanel runs={runs} />}
        {activeTab !== "Summary" && activeTab !== "Plan" && <RunTypePanel key={activeTab} type={activeTab} runs={runs.filter((r) => r.type === activeTab)} />}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
